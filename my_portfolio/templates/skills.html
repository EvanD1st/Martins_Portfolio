<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B1B33; --surface:#122544; --surface2:#16305A;
    --accent:#3B82F6; --text:#E8EEF7; --muted:#8CA0C4; --green:#34D399;
    --mono:'JetBrains Mono',monospace; --body:'Inter',sans-serif;
    --radius:10px; --maxw:1100px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--body);line-height:1.6;}
  a{color:inherit;text-decoration:none;}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px;}

  header{position:sticky;top:0;background:rgba(11,27,51,0.9);backdrop-filter:blur(8px);
    border-bottom:1px solid #ffffff12;z-index:10;}
  nav.wrap{display:flex;justify-content:space-between;align-items:center;height:72px;}
  .brand{font-family:var(--mono);font-weight:700;font-size:1.05rem;color:var(--green);}
  .brand span{color:var(--muted);}
  .nav-links{display:flex;gap:28px;font-family:var(--mono);font-size:.9rem;}
  .nav-links a{color:var(--muted);transition:color .2s;}
  .nav-links a:hover, .nav-links a.active{color:var(--accent);}

  main{padding:70px 0;}
  .section-label{font-family:var(--mono);color:var(--green);font-size:.85rem;margin-bottom:8px;}
  .section-label::before{content:"$ ";color:var(--muted);}
  h1{font-family:var(--mono);font-size:2.1rem;margin-bottom:44px;}

  .cat-title{font-family:var(--mono);font-size:1.05rem;color:var(--accent);margin:44px 0 20px;}
  .cat-title:first-of-type{margin-top:0;}

  .skill-row{margin-bottom:18px;}
  .skill-top{display:flex;justify-content:space-between;font-family:var(--mono);font-size:.88rem;margin-bottom:8px;}
  .skill-top .pct{color:var(--green);}
  .bar-track{background:var(--surface);border-radius:6px;height:8px;overflow:hidden;border:1px solid #ffffff14;}
  .bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:6px;}

  .tool-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-top:16px;}
  .tool-card{background:var(--surface);border:1px solid #ffffff14;border-radius:var(--radius);
    padding:16px;font-family:var(--mono);font-size:.85rem;text-align:center;color:var(--muted);
    transition:border-color .2s,color .2s;}
  .tool-card:hover{border-color:var(--accent);color:var(--text);}

  footer{padding:40px 0;border-top:1px solid #ffffff12;text-align:center;color:var(--muted);
    font-family:var(--mono);font-size:.82rem;}

  @media(max-width:800px){ .nav-links{display:none;} }
</style>
</head>

<script>
  function updateGreetingAndClock() {
    const now = new Date();
    const hour = now.getHours();

    let greeting;
    if (hour < 12) greeting = "Good morning";
    else if (hour < 17) greeting = "Good afternoon";
    else if (hour < 21) greeting = "Good evening";
    else greeting = "Good night";

    document.getElementById("greeting").textContent = greeting;

    const timeString = now.toLocaleTimeString('en-US', {
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
      hour12: true
    });
    document.getElementById("clock").textContent = timeString;
  }

  updateGreetingAndClock();
  setInterval(updateGreetingAndClock, 1000);
</script>
